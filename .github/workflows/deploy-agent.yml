name: Deploy voice agent to Pipecat Cloud

on:
  push:
    branches: [main]
    paths:
      - "agent/bot.py"
      - "agent/prompts.py"
      - "agent/tools.py"
      - "agent/sms.py"
      - "agent/db.py"
      - "agent/webhooks.py"
      - "agent/requirements.txt"
      - "agent/Dockerfile"
      - "agent/pcc-deploy.toml"
      - ".github/workflows/deploy-agent.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: agent
          file: agent/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/summit-realty-ava:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/summit-realty-ava:${{ github.sha }}

      - name: Install Pipecat Cloud CLI
        run: pip install pipecatcloud

      - name: Authenticate with Pipecat Cloud
        run: |
          echo "${{ secrets.PIPECAT_CLOUD_API_TOKEN }}" | pcc auth use-pat
          pcc auth whoami | grep -q invictusblaze7@gmail.com

      - name: Deploy to Pipecat Cloud
        working-directory: agent
        run: |
          pcc deploy \
            realtime-voiceai-demo \
            "${{ secrets.DOCKERHUB_USERNAME }}/summit-realty-ava:${{ github.sha }}" \
            --credentials "${{ secrets.DOCKERHUB_IMAGE_PULL_SECRET }}" \
            --config-file pcc-deploy.toml \
            2>&1 | tee /tmp/pcc-deploy.log
          ! grep -q "ᓚᘏᗢ Error" /tmp/pcc-deploy.log
